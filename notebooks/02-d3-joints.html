  <script id="3" type="text/markdown">
    ## Simple dataset of balls

    Diameters in millimetres, taken from each sport's regulation specification (note: the data is *diameter*, not circumference — a baseball is 73 mm across, not the ~230 mm circumference number).

    Sources:

    - [Baseball — Wikipedia](https://en.wikipedia.org/wiki/Baseball_(ball))
    - [Cricket ball — Wikipedia](https://en.wikipedia.org/wiki/Cricket_ball)
    - [Lacrosse ball — Dimensions.com](https://www.dimensions.com/element/lacrosse-ball)
    - [Sports Ball Diameter Comparison — Topend Sports](https://www.topendsports.com/resources/equipment/ball-size.htm)
    - [Ping-Pong / Table Tennis Ball — Dimensions.com](https://www.dimensions.com/element/ping-pong-ball-table-tennis-ball)
    - [Sports Balls Dimensions — Dimensions.com](https://www.dimensions.com/collection/sports-balls)
    - [Sports Ball by Size — Size-Charts.com](https://size-charts.com/sports/sports-ball-by-size/)
  </script>
  <script id="5" type="module" pinned="">
    let balls = [
        {name: "Ping Pong",  mm: 40},
        {name: "Golf",       mm: 43},
        {name: "Squash",     mm: 40},
        {name: "Billiard",   mm: 57},
        {name: "Tennis",     mm: 67},
        {name: "Cricket",    mm: 72},
        {name: "Baseball",   mm: 73},
        {name: "Lacrosse",   mm: 63},
        {name: "Softball",   mm: 97},
        {name: "Volleyball", mm: 210},
        {name: "Soccer",     mm: 220},
        {name: "Basketball", mm: 240},
        {name: "Bowling",    mm: 217}
      ];

    d3.shuffle(balls)

    const diams = balls.map(b => b.mm);
  </script>
  <script id="129" type="text/x-typescript" pinned="">
    display(diams)
  </script>
  <script id="131" type="text/x-typescript" pinned="">
    const w = 980;
    const h = 200;
    const svg = d3.create("svg")
      .attr("width", w)
      .attr("height", h)
      .attr("viewBox", `0 0 ${w} ${h}`)
      .style("background-color", "tomato");
  </script>
  <script id="134" type="text/x-typescript" pinned="">
    const inset = 10;
    const r = 20;
    const scaleFactor = 0.2;
    svg.selectAll("circle")
      .data(diams)
      .join("circle")
      .attr("cx", (d, i) => i * (w - inset * 2) / diams.length + r + inset)
      .attr("cy", h * 0.5)
    //  .attr("r", r)
      .attr("r", (d, i) => d / 2 * scaleFactor)
      .style("fill", "lightyellow");
  </script>
  <script id="133" type="text/x-typescript" pinned="">
    display(svg.node());
  </script>

    const insetB = 30;

  <script id="153" type="text/x-typescript" pinned="">
    const filteredBalls = balls.filter(b => {
      if (mode === "all") return true;
      if (mode === "small") return b.mm < 100;
      if (mode === "big") return b.mm >= 100;
    })

    //display(filteredBalls)

  <script id="157" type="text/x-typescript" pinned="">
    const wM = 980;
    const hM = 200;
    const svgM = d3.create("svg")
      .attr("width", wM)
      .attr("height", hM)
      .attr("viewBox", `0 0 ${wM} ${hM}`)
      .style("background-color", "tomato");
  </script>
  <script id="156" type="text/x-typescript" pinned="">
    const insetM = 50;
      const scaleFactorM = 0.2;

      const cxM = (d, i) => insetM + (i + 0.5) * (wM - 2 * insetM) /
      filteredBalls.length;

      svgM.selectAll("circle")
        .data(filteredBalls, d => d.name)
        .join(
          enter => enter.append("circle")
            .attr("fill", "lightyellow")
            .attr("cx", cxM)
            .attr("cy", hM * 0.5),
          update => update.style("fill", "lightyellow"),
          exit => exit.remove(),
        )
        .transition().duration(750)
        .attr("cx", cxM)
        .attr("cy", hM * 0.5)
        .attr("r", d => d.mm / 2 * scaleFactorM);

      svgM.selectAll("text")
        .data(filteredBalls, d => d.name)
        .join(
          enter => enter.append("text")
            .text(d => d.name)
            .attr("x", cxM)
            .attr("y", 140)
            .style("opacity", 0),
          update => update
            .style("fill", "lightyellow")
            .style("opacity", 1),
          exit => exit.remove(),
        )
        .text(d => d.name)
        .classed("text", true)
        .attr("text-anchor", "middle")
        .attr("font-size", "12")
        .transition().duration(750)
        .style("opacity", 1)
        .attr("x", cxM)
        .attr("y", 140);

  </script>
  <script id="152" type="text/x-typescript" pinned="">

  </script>
  <script id="158" type="text/x-typescript" pinned="">
    display(svgM.node())
