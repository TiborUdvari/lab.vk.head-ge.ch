  <title>01 - D3 Selections</title>
  <script id="1" type="text/markdown">
    # 01 - D3 Selections

    Goal: get fluent with `d3.select`, `d3.selectAll`, `.data()`, `.join()`.
  </script>
  <script id="2" type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
        d3
  </script>
  <script id="3" type="text/markdown">
    ## A static SVG with one circle per data point
  </script>
  <script id="8" type="text/x-typescript" pinned="">
    const data = [0, 10, 30, 50, 80, 120, 160, 200];

  </script>
  <script id="5" type="module" pinned="">
        const svg = d3.create("svg")
            .style("width", "100%")
            .style("height", "auto")
            .style("background-color", "tomato")
            .attr("viewBox", "0 0 400 100");

        svg.selectAll("circle")
            .data(data)
            .join("circle")
            .attr("cx", d => d)
            .attr("cy", 50)
            .attr("r", 8)
            .attr("fill", "yellow");

        display(svg.node());
  </script>
</notebook>
