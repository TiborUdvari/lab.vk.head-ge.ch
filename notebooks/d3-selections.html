## A static SVG with one circle per data point
    </script>
    <script type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

        const data = [10, 30, 50, 80, 120, 160, 200];

        const svg = d3.create("svg")
            .attr("width", 400)
            .attr("height", 100)
            .attr("viewBox", "0 0 400 100");

        svg.selectAll("circle")
            .data(data)
            .join("circle")
            .attr("cx", d => d + 20)
            .attr("cy", 50)
            .attr("r", 8)
            .attr("fill", "steelblue");

        display(svg.node());
    </script>
