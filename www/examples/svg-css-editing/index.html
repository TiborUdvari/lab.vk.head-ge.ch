<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My test page</title>
    <style>
      @import "https://necolas.github.io/normalize.css/8.0.1/normalize.css";

      body {
        font-family: sans-serif;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        padding-top: 3rem;
      }
     
      svg {
        stroke: black;
        .pocket {
          fill: yellow;    
        }

        .shirt {
          fill: tomato;    
        }
      }
    </style>

    <script type="module">
      console.log("Hello friend");

      const fakeData = [
        {
          color: "red",
          type: "shirt"
        },
        {
          color: "blue",
          type: "pants"
        },
        {
          color: "black",
          type: "shirt"
        },
        {
          color: "green"
        },
        {
          color: "aliceblue"
        },
        {
          color: "tomato"
        },
        {
          color: "pink"
        },
      ];

      const shirtTemplate = document.querySelector("#shirt-template");
      const pantsTemplate = document.querySelector("#pants-template");
      const grid = document.querySelector(".grid");

      for (const dataPoint of fakeData) {
        const color = dataPoint.color; 
        const type = dataPoint.type ?? "shirt";

        let template;  
        if (type === "shirt") {
          template = shirtTemplate;
        } else if (type === "pants") {
          template = pantsTemplate;
        }

        const clone = template.content.cloneNode(true);
        
        const shirtEl = clone.querySelector(".shirt");
        if (shirtEl) {
          shirtEl.style.fill = dataPoint.color;
        }

        grid.appendChild(clone);
      }

    </script>
  </head>
  <body>
    <template id="shirt-template">
      <svg width="49" height="48" viewBox="0 0 49 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="shirt" d="M25 12.5C16 12.5 18.5 0.5 14 0.5H0.5V47H48V0.5H34C29.5 0.499999 34 12.5 25 12.5Z" />
        <path class="pocket" d="M8 28V18.5H16.5V28H8Z" />
      </svg>
    </template>
    
    <template id="pants-template">
      <svg width="49" height="48" viewBox="0 0 49 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="pocket" d="M8 28V18.5H16.5V28H8Z" />
      </svg>
    </template>

    <div class="grid">
    </div>
  </body>
</html>
