<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Simple Transition</title>
    <style>
      @import "https://necolas.github.io/normalize.css/8.0.1/normalize.css";
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 200;
        perspective: 800px;
      }

      main {
        display: flex;
        flex-direction: column;
      }

      .hero {
        height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 800px;

        .card {
          width: 60vw;
          max-width: 800px;
          border-radius: 1rem;
          aspect-ratio: 16/9;
          transform: rotate3d(0, 1, 0, 180deg);
          transform-style: preserve-3d;
          position: relative;
          transition: transform 0.8s ease;

          &.revealed {
            transform: rotate3d(0, 1, 0, 0deg);
          }

          & img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            backface-visibility: hidden;
            border-radius: 1rem;
          }

          & .back {
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            background-color: gray;
            backface-visibility: hidden;
            transform: rotate3d(0, 1, 0, 180deg);
          }
        }
      }
    </style>

    <script type="module">
      const card = document.querySelector(".card");
      const observer = new IntersectionObserver(
        ([entry]) => {
          if (entry.isIntersecting) {
            card.classList.add("revealed");
            observer.disconnect();
          }
        },
        { threshold: 1.0 }
      );
      observer.observe(card);
    </script>
  </head>
  <body>
    <main>
      <section class="hero">
        <h2>Hmm I wonder what's on the back of that card below?</h2>
      </section>
      <section class="container">
        <div class="card">
          <img src="https://tiborudvari.com/_astro/madog.lMan-Stj_ZUdg2W.webp" />
          <div class="back"></div>
        </div>
      </section>
    </main>
  </body>
</html>
