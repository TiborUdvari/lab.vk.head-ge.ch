<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>p5 Lerp Bar Chart</title>
    <style>
      @import "https://necolas.github.io/normalize.css/8.0.1/normalize.css";
      body { overflow: hidden; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      const datasets = [
        [30, 80, 45, 90, 20, 65, 50, 75, 35, 60],
        [70, 25, 85, 15, 95, 40, 80, 30, 70, 45],
        [55, 45, 70, 35, 60, 90, 25, 65, 80, 40],
      ];

      const SPEED = 0.02;
      let current = 0;
      let next = 0;
      let t = 0;

      function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
      }

      function mousePressed() {
        current = next;
        next = (next + 1) % datasets.length;
        t = 0;
      }

      function draw() {
        background(255);

        t = min(t + SPEED, 1);

        const pad = 60;
        const step = (width - pad * 2) / datasets[0].length;
        const barW = step * 0.5;
        const maxH = height - pad * 3;
        const baseline = height - pad;

        for (let i = 0; i < datasets[0].length; i++) {
          const value = lerp(datasets[current][i], datasets[next][i], t);
          const barH = map(value, 0, 100, 0, maxH);

          push();
          translate(pad + step * 0.5 + i * step, baseline);

          fill(0);
          rect(-barW / 2, -barH, barW, barH);

          textAlign(CENTER, TOP);
          textSize(13);
          text(round(value), 0, 8);

          pop();
        }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </head>
  <body></body>
</html>
